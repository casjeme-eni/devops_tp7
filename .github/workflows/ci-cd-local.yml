name: CI/CD - Local Deploy (Runner)
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
env:
  # Variables communes (adapter si ton code attend d'autres noms)
  DB_HOST: 127.0.0.1
  DB_USER: root
  DB_PASSWORD: root
  DB_NAME: todolist_db
  PORT: 3000
  NODE_ENV: test
jobs:
  test:
    name: "Tests (Jest: unit + integration)"
    runs-on: ubuntu-latest
  
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: todolist_db
        ports:
        - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node 18 + npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is up"
              exit 0
            fi
            echo "Waiting MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1
      - name: Run tests
        run: npm test
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build -t todolist-backend:ci .

  deploy_local:
    name: Local deploy (runner) + smoke test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build -t todolist-backend:ci .
      - name: Create network
        run: |
          docker network create ci-net

      # On redémarre une DB pour le "déploiement local" (séparée de celle des tests)
      - name: Run MySQL container
        run: |
          docker run -d --name todolist-mysql --network ci-net \
          -e MYSQL_ROOT_PASSWORD=root \
          -e MYSQL_DATABASE=todolist_db \
          -p 3306:3306 \
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot" \
          --health-interval=5s \
          --health-timeout=5s \
          --health-retries=20 \
          mysql:8.0

      - name: Wait for MySQL health
        run: |
          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' todolist-mysql 2>/dev/null || echo "starting")
            echo "MySQL health: $status"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker logs todolist-mysql
          exit 1

      - name: Run API container
        run: |
          docker run -d --name todolist-api --network ci-net \
            -e DB_HOST=todolist-mysql \
            -e DB_USER=root \
            -e DB_PASSWORD=root \
            -e DB_NAME=todolist_db \
            -e PORT=3000 \
            -p 3000:3000 \
            todolist-backend:ci
      - name: Wait API reachable
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/tasks > /dev/null; then
              echo "API reachable"
              exit 0
            fi
            echo "Waiting API..."
            sleep 2
          done
          docker logs todolist-api
          exit 1
      - name: Smoke test (GET /api/tasks)
        run: |
          curl -fsS http://localhost:3000/api/tasks
      - name: Teardown
        if: always()
        run: |
          docker rm -f todolist-api todolist-mysql || true